---
- name: Install frontend packages
  ansible.builtin.apt:
    name: "{{ frontend_packages }}"
    state: present
  tags: [packages, frontend]

- name: Ensure web server is running
  ansible.builtin.service:
    name: "{{ web_server_package }}"
    state: started
    enabled: true
  tags: [services, frontend]

- name: Add NodeSource repository for Node.js 18.x
  ansible.builtin.shell: curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
  args:
    executable: /bin/bash
    creates: /etc/apt/sources.list.d/nodesource.list
  tags: [nodejs, frontend]

- name: Install Node.js and npm
  ansible.builtin.apt:
    name: nodejs
    state: present
  tags: [nodejs, frontend]

- name: Create application user home directory
  ansible.builtin.file:
    path: "/home/{{ app_user }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  tags: [directories, frontend]

- name: Create npm cache directory for taskapp
  ansible.builtin.file:
    path: "/home/{{ app_user }}/.npm"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  tags: [directories, frontend]

- name: Clone frontend application repository
  ansible.builtin.git:
    repo: "{{ frontend_repo_url }}"
    dest: "{{ frontend_src_dir }}"
    version: "{{ frontend_branch }}"
    force: true
    accept_hostkey: true # FIXED: Bypasses the invisible confirmation check
  become: true
  become_user: "{{ app_user }}"
  environment:
    GIT_TERMINAL_PROMPT: "0"
  tags: [git, deploy, frontend]

- name: Create .env file for frontend
  ansible.builtin.copy:
    dest: "{{ frontend_src_dir }}/.env.production"
    content: |
      VITE_APP_BACKEND_URL=/api
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
  tags: [configuration, frontend]

- name: Install frontend dependencies
  ansible.builtin.command: npm install
  args:
    chdir: "{{ frontend_src_dir }}"
  environment:
    npm_config_cache: "/home/{{ app_user }}/.npm"
  become_user: "{{ app_user }}"
  become: true
  tags: [npm, frontend]

- name: Build frontend production assets
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ frontend_src_dir }}"
  become_user: "{{ app_user }}"
  become: true
  tags: [npm, build, frontend]

- name: Ensure Nginx root directory exists
  ansible.builtin.file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  tags: [directories, frontend]

- name: Clean previous frontend build artifacts from Nginx root directory
  ansible.builtin.file:
    path: "{{ frontend_nginx_root }}"
    state: absent
  notify: Restart Nginx
  tags: [nginx, deploy, frontend]

- name: Recreate Nginx root directory after cleaning
  ansible.builtin.file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  notify: Restart Nginx
  tags: [nginx, deploy, frontend]

- name: Ensure nginx directories have correct permission
  ansible.builtin.file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    mode: "0755"
    recurse: true
  notify: Restart Nginx
  tags: [nginx, permission, frontend]

- name: Ensure frontend build files are readable by nginx
  ansible.builtin.command: "find {{ frontend_build_dir }} -type f -exec chmod 644 {} \\;"
  changed_when: false
  notify: Restart Nginx
  tags: [nginx, permission, frontend]

- name: Install nginx configuration for frontend application
  ansible.builtin.template:
    src: taskapp-nginx.conf.j2
    dest: /etc/nginx/sites-available/taskapp
    owner: root
    group: root
    mode: "0644"
  notify: Restart Nginx
  tags: [nginx, configuration, frontend]

- name: Remove default nginx configuration
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart Nginx
  tags: [nginx, configuration, frontend]

- name: Enable nginx configuration for frontend application
  ansible.builtin.file:
    src: /etc/nginx/sites-available/taskapp
    dest: /etc/nginx/sites-enabled/taskapp
    state: link
    force: true
  notify: Restart Nginx
  tags: [nginx, configuration, frontend]

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  notify: Restart Nginx
  tags: [nginx, configuration, frontend]
