---
- name: Check if K3s agent is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s-agent
  register: k3s_agent_binary

- name: Install K3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    K3S_URL=https://10.0.1.160:6443 \
    K3S_TOKEN={{ hostvars[groups['master'][0]].k3s_token }} sh -
  args:
    creates: /usr/local/bin/k3s-agent
  when: not k3s_agent_binary.stat.exists

- name: Ensure K3s agent service is running
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true
