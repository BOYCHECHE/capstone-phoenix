apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: taskapp
  annotations:
    kubernetes.io/ingress.class: traefik
    # ⚡ Explicitly forces Traefik to look at Pod Endpoint IPs directly instead of ClusterIPs
    traefik.ingress.kubernetes.io/service.nativelb: "true"
spec:
  rules:
    - host: taskapp.51.20.43.134.sslip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
