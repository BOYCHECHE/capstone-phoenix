apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: taskapp-ingressroute
  namespace: taskapp
  annotations:
    argocd.argoproj.io/tracking-id: taskapp-gitops:traefik.io/IngressRoute:taskapp/taskapp-ingressroute
spec:
  entryPoints:
    - web
  routes:
    # 1. API Path Routing rule
    - match: Host(`taskapp.51.20.43.134.sslip.io`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: backend
          port: 5000
    # 2. Frontend User Interface Routing rule
    - match: Host(`taskapp.51.20.43.134.sslip.io`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: frontend
          port: 80
