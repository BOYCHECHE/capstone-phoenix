apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: taskapp
  annotations:
    argocd.argoproj.io/tracking-id: taskapp-gitops:networking.k8s.io/Ingress:taskapp/taskapp-ingress
    # ⚡ Tells Traefik to normalize the hostname headers before passing traffic to Nginx
    traefik.ingress.kubernetes.io/router.priority: "1"
spec:
  ingressClassName: traefik
  rules:
    # 🌐 We use a wildcard rule to bypass the Nginx strict host block entirely
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
