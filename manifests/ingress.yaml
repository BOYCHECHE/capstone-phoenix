apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: taskapp
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: taskapp.51.20.43.134.sslip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                # 🔗 Forces Traefik to bypass namespace separation
                name: backend.taskapp.svc.cluster.local
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                # 🔗 Forces Traefik to bypass namespace separation
                name: frontend.taskapp.svc.cluster.local
                port:
                  number: 80
